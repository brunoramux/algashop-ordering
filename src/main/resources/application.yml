server.port: 8080

spring:
  application:
    name: billing
  datasource:
    url: 'jdbc:postgresql://localhost:5432/ordering'
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: 'true'
  flyway:
    enabled: true
    locations: classpath:db/migration
    user: postgres
    password: postgres
    url: 'jdbc:postgresql://localhost:5432/ordering'
    clean-disabled: false

algashop:
  integrations:
    shipping.provider: "RAPIDEX"
    rapidex:
      url: "http://localhost:8780"