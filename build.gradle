buildscript {	dependencies {		classpath 'org.flywaydb:flyway-core:11.13.0'		classpath 'org.flywaydb:flyway-database-postgresql:11.13.0'	}}plugins {	id 'idea'	id 'java'	id 'org.springframework.boot' version '4.0.1'	id 'io.spring.dependency-management' version '1.1.7'	id 'org.flywaydb.flyway' version '11.13.0'}group = 'com.algaworks.algashop'version = '0.0.1-SNAPSHOT'java {	toolchain {		languageVersion = JavaLanguageVersion.of(25)	}}configurations {	compileOnly {		extendsFrom annotationProcessor	}	mockitoAgent}repositories {	mavenCentral()}dependencies {	implementation 'org.springframework.boot:spring-boot-starter-webmvc'	implementation 'org.springframework.boot:spring-boot-starter-restclient'	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'	implementation 'org.springframework.boot:spring-boot-starter-validation'	implementation 'org.springframework.boot:spring-boot-starter-cache'	implementation 'org.springframework.boot:spring-boot-starter-data-redis'	implementation 'com.fasterxml.uuid:java-uuid-generator:5.1.0'	implementation 'commons-validator:commons-validator:1.9.0'	implementation 'io.hypersistence:hypersistence-tsid:2.1.4'	implementation 'org.modelmapper:modelmapper:3.2.4'	implementation 'org.flywaydb:flyway-core'	implementation 'org.flywaydb:flyway-database-postgresql'	runtimeOnly 'org.postgresql:postgresql'	runtimeOnly 'com.h2database:h2'	compileOnly 'org.projectlombok:lombok'	annotationProcessor 'org.projectlombok:lombok'	constraints {		testImplementation('io.rest-assured:rest-assured:6.0.0') {			version {				strictly '6.0.0'			}		}		testImplementation('io.rest-assured:spring-mock-mvc:6.0.0') {			version {				strictly '6.0.0'			}		}	}	testImplementation 'io.rest-assured:rest-assured'	testImplementation 'io.rest-assured:spring-mock-mvc'	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'	testImplementation 'org.springframework.boot:spring-boot-starter-restclient-test'	testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'	testImplementation 'org.springframework.boot:spring-boot-starter-flyway-test'	testImplementation 'org.springframework.boot:spring-boot-testcontainers'	testImplementation 'org.testcontainers:testcontainers-junit-jupiter'	testImplementation 'org.testcontainers:testcontainers-postgresql'	testImplementation 'org.springframework.boot:spring-boot-starter-cache-test'	testImplementation 'org.springframework.boot:spring-boot-starter-data-redis-test'	testImplementation 'org.assertj:assertj-core:3.27.3'	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'	mockitoAgent('org.mockito:mockito-core:5.14.2') {transitive = false}}tasks.named('test') {	useJUnitPlatform()}// TAREFA DE TESTE CONFIGURADA PARA EXCLUIR OS TESTES DE INTEGRAÇÃO (QUE TERMINAM COM "IT") E INCLUIR APENAS OS TESTES UNITÁRIOS (QUE TERMINAM COM "TEST").test {	filter {		excludeTestsMatching("*IT")	}	jvmArgs += "-javaagent:${configurations.mockitoAgent.asPath}"}tasks.named('check') {	dependsOn(test, integrationTest)}// REGISTRO DE TAREFA PARA TESTES DE INTEGRAÇÃO.// ESSA TAREFA VAI EXECUTAR APENAS OS TESTES QUE TERMINAM COM "IT" (INTEGRAÇÃO TEST) E VAI EXCLUIR OS TESTES QUE TERMINAM COM "TEST" (TESTES UNITÁRIOS).tasks.register('integrationTest', Test) {	description = "Run integration tests."	group = 'verification'	jvmArgs += "-javaagent:${configurations.mockitoAgent.asPath}"	testClassesDirs = sourceSets.test.output.classesDirs	classpath = sourceSets.test.runtimeClasspath	shouldRunAfter test	useJUnitPlatform()	testLogging {		events "passed"	}	filter {		includeTestsMatching "*IT"		excludeTestsMatching "*Test"	}}